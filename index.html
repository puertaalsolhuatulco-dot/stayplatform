<!DOCTYPE html>
<html>

<head>

<title>StayPlatform</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{

background:#ff385c;
color:white;
padding:20px;
text-align:center;

}

.search{

text-align:center;
margin:20px;

}

input{

padding:10px;
width:200px;

}

button{

padding:10px;
background:#ff385c;
color:white;
border:none;

}

.container{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;

}

.card{

background:white;
border-radius:10px;
padding:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);

}

.card img{

width:100%;
border-radius:10px;

}

.menu{

margin-top:10px;

}

footer{

text-align:center;
padding:20px;
background:#222;
color:white;

}

</style>

</head>

<body>

<header>

<h1>StayPlatform</h1>
<p>Encuentra hospedaje con comida incluida</p>

</header>

<div class="search">

<input id="city" placeholder="Buscar ciudad">
<button onclick="search()">Buscar</button>

</div>

<div class="container" id="results">

<div class="card">

<img src="https://picsum.photos/400/200">

<h3>Departamento Vista al Mar</h3>

<p>Acapulco</p>

<p>$1200 por noche</p>

<div class="menu">

<select>

<option>Sin comida</option>
<option>Desayuno</option>
<option>Desayuno + comida</option>
<option>Desayuno + comida + cena</option>

</select>

</div>

<button>Reservar</button>

</div>


<div class="card">

<img src="https://picsum.photos/401/200">

<h3>Casa Centro</h3>

<p>Cancún</p>

<p>$900 por noche</p>

<div class="menu">

<select>

<option>Sin comida</option>
<option>Desayuno</option>
<option>Desayuno + comida</option>
<option>Desayuno + comida + cena</option>

</select>

</div>

<button>Reservar</button>

</div>

</div>

<footer>

<p>StayPlatform © 2026</p>

</footer>

<script>

function search(){

let city=document.getElementById("city").value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let text=card.innerText.toLowerCase()

if(text.includes(city)){

card.style.display="block"

}else{

card.style.display="none"

}

})

}

</script>

</body>

</html>
